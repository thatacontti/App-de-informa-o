upstream painel_web {
    server web:3000;
}

# Production: serve at https://bi.catarina.local/painel/v27
# Dev: HTTP on :80 is fine. TLS comes from a sidecar (certbot/letsencrypt)
# in real deploy.

server {
    listen 80;
    server_name bi.catarina.local localhost;

    client_max_body_size 25m;

    # Health probe
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /painel/v27 {
        proxy_pass http://painel_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location / {
        return 302 /painel/v27;
    }
}
