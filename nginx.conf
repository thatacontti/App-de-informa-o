upstream painel_web {
    server web:3000;
    keepalive 16;
}

# Production: serve at https://bi.catarina.local/painel/v27
# Dev: HTTP on :80 is fine. TLS comes from a sidecar (certbot /
# Let's Encrypt) in real deploys — see deploy/tls/README.md.

server {
    listen 80 default_server;
    server_name bi.catarina.local localhost _;

    client_max_body_size 25m;
    server_tokens off;

    # Reasonable security headers (overridable per-route below).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Health probe (used by uptime checks; bypasses everything else).
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Apex → painel
    location = / {
        return 302 /painel/v27;
    }

    # API surface — passes through transparently, no caching.
    location ~ ^/painel/v27/(api|_next)/ {
        proxy_pass http://painel_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_buffering off;
    }

    location /painel/v27 {
        proxy_pass http://painel_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location / {
        return 404;
    }
}
